server {
    listen 80;
    server_name z-tutorial localhost z-tutorial.brusegan.it;

    root /var/www/html/z-tutorial/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.(css|js|html|png|jpg|gif|ico|svg|woff2?)$ {
        root /var/www/html/z-tutorial;
        try_files $uri =404;
    }
}
